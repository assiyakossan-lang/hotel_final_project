<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="navbar">
  <a class="brand" href="/index.html">Hotel Booking</a>
  <nav id="navlinks" class="navlinks"></nav>
</header>

<main class="container auth-page">
  <h1>Login to your account</h1>
  <p class="muted">No account yet? <a href="/register.html">Register here</a> and book your room online.</p>

  <form class="form" id="loginForm">
    <label for="loginEmail">Email</label>
    <input id="loginEmail" name="email" type="email" required placeholder="user@hotel.kz" autocomplete="email">

    <label for="loginPassword">Password</label>
    <input id="loginPassword" name="password" type="password" required placeholder="user123" autocomplete="current-password">

    <button class="btn" type="submit">Login</button>
    <a class="btn secondary" href="/index.html">Back to menu</a>
    <div id="message"></div>
  </form>
</main>
<footer class="footer"><p><strong>Hotel Booking</strong> — бронируйте комфортные номера по выгодной цене.</p><p>Есть вопросы? Напишите в поддержку: <a href="mailto:support@hotelbooking.kz">support@hotelbooking.kz</a>. Мы ответим и поможем с бронированием.</p></footer>

<script src="/app.js"></script>
<script>
byId('loginForm').addEventListener('submit', async (event) => {
  event.preventDefault();

  const body = {
    email: byId('loginEmail').value.trim(),
    password: byId('loginPassword').value
  };

  try {
    await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify(body)
    });
    location.href = '/index.html';
  } catch (error) {
    msg('message', error.message, 'error');
  }
});
</script>
</body>
</html>
